name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev --frozen --python ${{ matrix.python-version }}

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest tests/test_structure.py tests/test_risk.py tests/test_macd_baseline.py -v
